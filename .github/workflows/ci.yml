name: gate

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The same balanced hard-gate the Architect runs locally, with real exit
      # codes. CI is the third verification layer after local gate + runtime smoke.
      - run: bash gate.sh
